<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="hero">
        <h1>Welcome to Tech Solutions</h1>
        <p>
            We help businesses build modern software,
            websites and digital products.
        </p>
        <button>Contact Us</button>
        <p class="tagline">
            Trusted by startups and growing businesses.
        </p>
    </div>

    <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <label>Name</label>
            <input type="text" placeholder="Enter your name" required>
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
            <label>Message</label>
            <textarea placeholder="Enter your message" rows="5" required>
            </textarea>
            <button type="submit">
                Submit
            </button>
    
        </form>
    
    </section>
</body>

</html>
